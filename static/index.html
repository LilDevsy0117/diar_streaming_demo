<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live speaker diarization (microphone)</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121826;
      --border: #223047;
      --text: #e7eefc;
      --muted: #9fb0d0;
      --accent: #6ea8fe;
      --danger: #ff6b6b;
      --ok: #3dd68c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, #152042 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    h1 { font-size: 1.25rem; margin: 0; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    label { color: var(--muted); font-size: 0.85rem; }
    select, button {
      background: #0f1626;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.95rem;
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.primary { border-color: rgba(110,168,254,0.55); }
    button.danger { border-color: rgba(255,107,107,0.55); color: #ffd6d6; }
    .status { font-size: 0.85rem; color: var(--muted); }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 14px;
      margin-top: 14px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .viz { display: flex; flex-direction: column; gap: 10px; }
    canvas {
      width: 100%;
      height: 220px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #070a10;
    }
    .legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 0.8rem; color: var(--muted);
    }
    .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: middle; }
    .chat {
      height: 520px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cfe0ff;
    }
    .chat .line { border-bottom: 1px dashed rgba(255,255,255,0.06); padding: 6px 0; }
    .chat .t { color: #8aa7d6; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Live speaker diarization (microphone)</h1>
        <div class="sub">WebSocket · Sortformer streaming · 16 kHz mono</div>
      </div>
      <div class="status" id="wsStatus">WS: disconnected</div>
    </header>

    <div class="card">
      <div class="row" style="margin-bottom:10px;">
        <label for="modelSelect">Model</label>
        <select id="modelSelect"></select>
        <span class="status" id="modelMeta"></span>
      </div>
      <div class="row">
        <button class="primary" id="btnStart" type="button">Start microphone</button>
        <button class="danger" id="btnStop" type="button" disabled>Stop</button>
        <button id="btnReset" type="button" disabled>Reset state</button>
        <span class="status" id="micStatus"></span>
      </div>
    </div>

    <div class="grid">
      <div class="card viz">
        <div>
          <div class="sub" style="margin-bottom:6px;">Live heatmap · time → · rows = speakers</div>
          <canvas id="canvasLive" width="1100" height="220"></canvas>
        </div>
        <div>
          <div class="sub" style="margin-bottom:6px;">Running heatmap · time → · rows = speakers</div>
          <canvas id="canvasAccum" width="1100" height="220"></canvas>
        </div>
        <div class="legend" id="legend"></div>
      </div>
      <div class="card">
        <div class="sub" style="margin-bottom:8px;">Segment log</div>
        <div class="chat" id="streamChat"></div>
      </div>
    </div>
  </div>

  <script>
    const WS_PROTO = location.protocol === "https:" ? "wss" : "ws";
    const WS_URL = `${WS_PROTO}://${location.host}/ws`;

    const el = (id) => document.getElementById(id);
    const modelSelect = el("modelSelect");
    const btnStart = el("btnStart");
    const btnStop = el("btnStop");
    const btnReset = el("btnReset");
    const wsStatus = el("wsStatus");
    const micStatus = el("micStatus");
    const modelMeta = el("modelMeta");
    const streamChat = el("streamChat");
    const canvasLive = el("canvasLive");
    const canvasAccum = el("canvasAccum");
    const legendEl = el("legend");

    const ctxLive = canvasLive.getContext("2d");
    const ctxAccum = canvasAccum.getContext("2d");

    let ws = null;
    let audioCtx = null;
    let workletNode = null;
    let mediaStream = null;
    let nSpk = 8;
    let silThreshold = 0.2;
    let vadOnset = 0.5;
    let vadOffset = 0.5;

    const SPK_COLORS = [
      "#6ea8fe", "#3dd68c", "#ffd166", "#ff6b6b", "#c77dff",
      "#00d4ff", "#ffb4a2", "#a8dadc", "#e9c46a", "#2a9d8f"
    ];

    const HEAT_BG = { r: 7, g: 10, b: 16 };

    function hexToRgb(hex) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return m
        ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) }
        : { r: 110, g: 168, b: 254 };
    }

    /** Classic 2D heatmap: x = time (columns), y = speaker bands (rows), intensity = probability. */
    function drawHeatmap(ctx, canvas, cols, n, _opts) {
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#070a10";
      ctx.fillRect(0, 0, W, H);
      if (!cols.length || n < 1) return;

      const T = cols.length;
      const cellW = W / T;
      const rowH = H / n;
      const gap = 1;

      for (let t = 0; t < T; t++) {
        const col = cols[t];
        const x0 = t * cellW;
        const cw = Math.max(1, cellW - 0.25);
        for (let s = 0; s < n; s++) {
          const v = Math.max(0, Math.min(1, col[s] || 0));
          const y0 = s * rowH;
          const rh = Math.max(1, rowH - gap);
          const { r: pr, g: pg, b: pb } = hexToRgb(SPK_COLORS[s % SPK_COLORS.length]);
          const r = HEAT_BG.r + (pr - HEAT_BG.r) * v;
          const g = HEAT_BG.g + (pg - HEAT_BG.g) * v;
          const b = HEAT_BG.b + (pb - HEAT_BG.b) * v;
          ctx.fillStyle = `rgb(${r | 0},${g | 0},${b | 0})`;
          ctx.fillRect(x0, y0, cw, rh);
        }
      }

      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (let s = 1; s < n; s++) {
        const y = s * rowH;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
    }

    function setWsStatus(text, ok) {
      wsStatus.textContent = "WS: " + text;
      wsStatus.className = "status" + (ok === true ? " ok" : ok === false ? " err" : "");
    }

    function connectWs() {
      if (ws && ws.readyState === WebSocket.OPEN) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const s = new WebSocket(WS_URL);
        s.binaryType = "arraybuffer";
        s.onopen = () => { setWsStatus("connected", true); resolve(); };
        s.onerror = () => { setWsStatus("error", false); reject(new Error("ws error")); };
        s.onclose = () => { setWsStatus("disconnected", false); };
        s.onmessage = (ev) => {
          if (typeof ev.data !== "string") return;
          let msg;
          try { msg = JSON.parse(ev.data); } catch { return; }
          if (msg.type === "probs") handleProbs(msg);
          else if (msg.type === "reset") { /* ok */ }
          else if (msg.type === "model") {
            if (msg.ok) applyModelMeta(msg);
            else micStatus.textContent = "Model switch failed: " + (msg.error || "");
          }
        };
        ws = s;
      });
    }

    function applyModelMeta(m) {
      nSpk = Math.max(1, m.n_spk | 0);
      silThreshold = m.sil_threshold != null ? +m.sil_threshold : silThreshold;
      vadOnset = m.vad_onset != null ? +m.vad_onset : vadOnset;
      vadOffset = m.vad_offset != null ? +m.vad_offset : vadOffset;
      modelMeta.textContent = `${m.label || m.id} · ${nSpk}ch`;
      rebuildLegend();
      clearAccum();
    }

    function rebuildLegend() {
      legendEl.innerHTML = "";
      for (let i = 0; i < nSpk; i++) {
        const d = document.createElement("span");
        d.innerHTML = `<span class="swatch" style="background:${SPK_COLORS[i % SPK_COLORS.length]}"></span>spk${i}`;
        legendEl.appendChild(d);
      }
    }

    let accumCols = [];
    const ACCUM_MAX = 600;

    function clearAccum() {
      accumCols = [];
      drawHeatmap(ctxAccum, canvasAccum, [], nSpk, { mode: "accum" });
    }

    let liveCols = [];
    const LIVE_MAX = 120;

    function pushLiveCol(probRow) {
      liveCols.push(probRow.slice(0, nSpk));
      if (liveCols.length > LIVE_MAX) liveCols.shift();
      drawHeatmap(ctxLive, canvasLive, liveCols, nSpk, { mode: "live" });
    }

    function pushAccumCol(probRow) {
      const row = probRow.slice(0, nSpk);
      accumCols.push(row);
      if (accumCols.length > ACCUM_MAX) accumCols.shift();
      drawHeatmap(ctxAccum, canvasAccum, accumCols, nSpk, { mode: "accum" });
    }

    /** Cumulative audio time for heatmap column alignment (matches PCM chunks). */
    let lastSegT = 0;

    function appendSegmentLogFromServer(entries) {
      if (!entries || !entries.length) return;
      for (const ev of entries) {
        const line = document.createElement("div");
        line.className = "line";
        if (ev.start != null && ev.end != null) {
          line.innerHTML = `<span class="t">${Number(ev.start).toFixed(2)}s : ${Number(ev.end).toFixed(2)}s</span>  spk${ev.spk}`;
        } else if (ev.t != null) {
          line.innerHTML = `<span class="t">${Number(ev.t).toFixed(2)}s</span>  spk${ev.spk}  p=${Number(ev.p).toFixed(3)}`;
        }
        streamChat.appendChild(line);
      }
      streamChat.scrollTop = streamChat.scrollHeight;
    }

    function handleProbs(msg) {
      const data = msg.data;
      if (!data || !data.length) return;
      const rows = data;
      const n = rows.length;
      const frameLen = msg.frame_len_sec || 0.08;
      const chunkDur =
        typeof msg.audio_duration_sec === "number" && msg.audio_duration_sec > 0
          ? msg.audio_duration_sec
          : n * frameLen;
      const chunkStart = lastSegT;
      for (let r = 0; r < n; r++) {
        pushLiveCol(rows[r]);
        pushAccumCol(rows[r]);
      }
      lastSegT = chunkStart + chunkDur;

      appendSegmentLogFromServer(msg.postproc_log);
    }

    async function loadModelList() {
      const r = await fetch("/api/models");
      const j = await r.json();
      modelSelect.innerHTML = "";
      for (const m of j.models || []) {
        const o = document.createElement("option");
        o.value = m.id;
        o.textContent = m.label;
        modelSelect.appendChild(o);
      }
      if (j.current_id) modelSelect.value = j.current_id;
      nSpk = j.current_n_spk || 8;
      if (j.sil_threshold != null) silThreshold = +j.sil_threshold;
      if (j.vad_onset != null) vadOnset = +j.vad_onset;
      if (j.vad_offset != null) vadOffset = +j.vad_offset;
      modelMeta.textContent = `${modelSelect.options[modelSelect.selectedIndex]?.text || ""} · ${nSpk}ch`;
      rebuildLegend();
    }

    modelSelect.addEventListener("change", async () => {
      await connectWs().catch(() => {});
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ cmd: "set_model", id: modelSelect.value }));
      }
    });

    const workletCode = `
      class Pcm16kMono extends AudioWorkletProcessor {
        constructor() { super(); this._buf = new Float32Array(0); this._target = 2560; }
        process(inputs) {
          const ch0 = inputs[0] && inputs[0][0];
          if (!ch0 || !ch0.length) return true;
          const merged = new Float32Array(this._buf.length + ch0.length);
          merged.set(this._buf, 0);
          merged.set(ch0, this._buf.length);
          this._buf = merged;
          while (this._buf.length >= this._target) {
            const chunk = this._buf.subarray(0, this._target);
            this._buf = this._buf.subarray(this._target);
            const pcm = new Int16Array(this._target);
            for (let i = 0; i < this._target; i++) {
              let x = chunk[i];
              if (x > 1) x = 1; else if (x < -1) x = -1;
              pcm[i] = x < 0 ? x * 0x8000 : x * 0x7fff;
            }
            this.port.postMessage(pcm.buffer, [pcm.buffer]);
          }
          return true;
        }
      }
      registerProcessor("pcm16k-mono", Pcm16kMono);
    `;

    btnStart.addEventListener("click", async () => {
      micStatus.textContent = "";
      try {
        await connectWs();
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
          video: false
        });
        audioCtx = new AudioContext({ sampleRate: 16000 });
        const blob = new Blob([workletCode], { type: "application/javascript" });
        const url = URL.createObjectURL(blob);
        await audioCtx.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);
        const src = audioCtx.createMediaStreamSource(mediaStream);
        workletNode = new AudioWorkletNode(audioCtx, "pcm16k-mono");
        workletNode.port.onmessage = (e) => {
          if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
        };
        const silent = audioCtx.createGain();
        silent.gain.value = 0;
        src.connect(workletNode);
        workletNode.connect(silent);
        silent.connect(audioCtx.destination);
        btnStart.disabled = true;
        btnStop.disabled = false;
        btnReset.disabled = false;
        micStatus.textContent = "Microphone capturing";
        micStatus.className = "status ok";
      } catch (e) {
        micStatus.textContent = String(e.message || e);
        micStatus.className = "status err";
      }
    });

    btnStop.addEventListener("click", () => {
      try {
        if (workletNode) { workletNode.disconnect(); workletNode = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        if (mediaStream) { mediaStream.getTracks().forEach((t) => t.stop()); mediaStream = null; }
      } catch {}
      btnStart.disabled = false;
      btnStop.disabled = true;
      micStatus.textContent = "";
      micStatus.className = "status";
    });

    btnReset.addEventListener("click", async () => {
      await connectWs().catch(() => {});
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ cmd: "reset" }));
        lastSegT = 0;
        liveCols = [];
        clearAccum();
        streamChat.innerHTML = "";
      }
    });

    loadModelList().catch(() => {});
  </script>
</body>
</html>
